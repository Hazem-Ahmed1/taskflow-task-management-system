<div class="auth-page">
  <div class="auth-bg">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <path d="M4 4h7v7H4zm0 9h7v7H4zm9-9h7v7h-7zm0 9h7v7h-7z"/>
        </svg>
      </div>
      <span class="logo-text">TaskFlow</span>
    </div>

    <div class="auth-header">
      <h1>Create your account</h1>
      <p>Start managing projects smarter today</p>
    </div>

    <!-- Error Banner -->
    <div class="error-banner" *ngIf="errorMessage">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L9.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
      </svg>
      {{ errorMessage }}
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <!-- Full Name -->
      <div class="form-field">
        <label for="name">Full name</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
          </svg>
          <input
            id="name"
            type="text"
            placeholder="John Doe"
            [(ngModel)]="name"
            name="name"
            autocomplete="name"
            [disabled]="isLoading" />
        </div>
      </div>

      <!-- Email -->
      <div class="form-field">
        <label for="email">Email address</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
          </svg>
          <input
            id="email"
            type="email"
            placeholder="you@example.com"
            [(ngModel)]="email"
            name="email"
            autocomplete="email"
            [disabled]="isLoading" />
        </div>
      </div>

      <!-- Password -->
      <div class="form-field">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
          </svg>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Min. 6 characters"
            [(ngModel)]="password"
            name="password"
            autocomplete="new-password"
            [disabled]="isLoading" />
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
            <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
              <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
            </svg>
            <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/>
              <path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/>
            </svg>
          </button>
        </div>
        <!-- Strength indicator -->
        <div class="password-strength" *ngIf="password">
          <div class="strength-bars">
            <span class="bar" [class.active]="passwordStrength === 'weak' || passwordStrength === 'fair' || passwordStrength === 'strong'" [class.weak]="passwordStrength === 'weak'"></span>
            <span class="bar" [class.active]="passwordStrength === 'fair' || passwordStrength === 'strong'" [class.fair]="passwordStrength === 'fair'"></span>
            <span class="bar" [class.active]="passwordStrength === 'strong'" [class.strong]="passwordStrength === 'strong'"></span>
          </div>
          <span class="strength-label" [class]="'label-' + passwordStrength">
            {{ passwordStrength === 'weak' ? 'Weak' : passwordStrength === 'fair' ? 'Fair' : 'Strong' }}
          </span>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-field">
        <label for="confirmPassword">Confirm password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
          </svg>
          <input
            id="confirmPassword"
            [type]="showConfirmPassword ? 'text' : 'password'"
            placeholder="Repeat password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            autocomplete="new-password"
            [class.mismatch]="confirmPassword && confirmPassword !== password"
            [disabled]="isLoading" />
          <button type="button" class="toggle-password" (click)="showConfirmPassword = !showConfirmPassword">
            <svg *ngIf="!showConfirmPassword" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
              <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
            </svg>
            <svg *ngIf="showConfirmPassword" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/>
              <path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="submit-btn" type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Create account</span>
        <span *ngIf="isLoading" class="loading-row">
          <svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4" stroke-dashoffset="10" stroke-linecap="round"/>
          </svg>
          Creating account…
        </span>
      </button>
    </form>

    <p class="auth-switch">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
