<div class="board-detail-container" *ngIf="board" [style.background]="board.backgroundColor">
  <div class="board-overlay"></div>
  
  <div class="board-header">
    <div class="board-header-left">
      <button class="back-btn" (click)="goBack()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path d="M12 4l-8 6 8 6V4z"/>
        </svg>
      </button>
      <h1 class="board-title">{{ board.title }}</h1>
      <button 
        class="star-btn"
        [class.starred]="board.isStarred"
        (click)="toggleStar()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path d="M10 1l3 6 6.5 1-4.75 4.5 1.25 6.5L10 16l-5.75 3 1.25-6.5L1 8l6.5-1z"/>
        </svg>
      </button>
    </div>

    <div class="board-header-right">
      <div class="board-members">
        <app-avatar
          *ngFor="let memberId of board.members"
          [imageUrl]="getUserById(memberId)?.avatar || ''"
          [name]="getUserById(memberId)?.name || ''"
          size="small">
        </app-avatar>
        <button class="add-member-btn" (click)="showMemberModal = true">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <app-button variant="ghost" size="small" (click)="showSettingsModal = true">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M3 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm6 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm6 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
        </svg>
        Settings
      </app-button>
    </div>
  </div>

  <div class="board-content">
    <app-board-content></app-board-content>
  </div>

  <!-- Settings Modal -->
  <app-modal 
    [(isOpen)]="showSettingsModal"
    title="Board Settings"
    [hasFooter]="true">
    <div modal-body>
      <app-input
        label="Board Title"
        placeholder="Enter board title"
        [(value)]="editBoard.title">
      </app-input>

      <app-input
        label="Description"
        placeholder="Enter board description"
        [(value)]="editBoard.description">
      </app-input>
    </div>

    <div modal-footer>
      <app-button variant="danger" (click)="deleteBoard()">
        Delete Board
      </app-button>
      <app-button variant="secondary" (click)="showSettingsModal = false">
        Cancel
      </app-button>
      <app-button variant="primary" (click)="saveSettings()">
        Save
      </app-button>
    </div>
  </app-modal>

  <!-- Add Member Modal -->
  <app-modal 
    [(isOpen)]="showMemberModal"
    title="Add Member"
    [hasFooter]="true">
    <div modal-body>
      <app-input
        label="Search users"
        placeholder="Enter name or email"
        [(value)]="memberSearchQuery"
        (valueChange)="searchMembers()">
      </app-input>

      <div class="user-search-results">
        <div 
          *ngFor="let user of filteredUsers"
          class="user-result-item"
          (click)="addMember(user.id)">
          <app-avatar
            [imageUrl]="user.avatar || ''"
            [name]="user.name"
            size="medium">
          </app-avatar>
          <div class="user-info">
            <div class="user-name">{{ user.name }}</div>
            <div class="user-email">{{ user.email }}</div>
          </div>
          <app-button 
            *ngIf="!isMember(user.id)"
            variant="primary" 
            size="small"
            (click)="addMember(user.id)">
            Add
          </app-button>
          <span *ngIf="isMember(user.id)" class="member-badge">Member</span>
        </div>
      </div>
    </div>

    <div modal-footer>
      <app-button variant="secondary" (click)="showMemberModal = false">
        Close
      </app-button>
    </div>
  </app-modal>
</div>
