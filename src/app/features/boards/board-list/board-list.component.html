<div class="boards-container">
  <div class="boards-header">
    <div class="boards-header-text">
      <h1>Your Boards</h1>
      <p>Manage your projects and tasks in one place</p>
    </div>
    <app-button variant="primary" size="medium" (click)="openCreateModal()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Create Board
    </app-button>
  </div>

  <div class="section-label">All Boards</div>

  <div class="boards-grid">
    <div
      *ngFor="let board of boards$ | async"
      class="board-card"
      [style.background]="board.backgroundColor"
      (click)="openBoard(board.id)">
      <div class="board-card-content">
        <h3 class="board-title">{{ board.title }}</h3>
        <div class="board-card-footer">
          <button
            class="star-btn"
            [class.starred]="board.isStarred"
            (click)="toggleStar($event, board.id)"
            [attr.aria-label]="board.isStarred ? 'Unstar board' : 'Star board'">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 1l3 6 6.5 1-4.75 4.5 1.25 6.5L10 16l-5.75 3 1.25-6.5L1 8l6.5-1z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="create-board-card" (click)="openCreateModal()">
      <div class="create-board-content">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="currentColor">
          <path d="M16 6v20M6 16h20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span>Create new board</span>
      </div>
    </div>
  </div>

  <!-- Create Board Modal -->
  <app-modal
    [(isOpen)]="showCreateModal"
    title="Create Board"
    [hasFooter]="true">
    <div modal-body>
      <form (submit)="createBoard($event)">
        <app-input
          label="Board Title"
          placeholder="Enter board title"
          [(value)]="newBoard.title"
          [error]="errors.title">
        </app-input>

        <app-input
          label="Description (optional)"
          placeholder="Enter board description"
          [(value)]="newBoard.description">
        </app-input>

        <div class="form-group">
          <label>Invite Members</label>
          <p class="member-help">Select people to add when the board is created.</p>
          <div class="members-picker">
            <button
              type="button"
              *ngFor="let user of selectableUsers"
              class="member-option"
              [class.selected]="isMemberSelected(user.id)"
              (click)="toggleMemberSelection(user.id)">
              <app-avatar
                [imageUrl]="user.avatar || ''"
                [name]="user.name"
                size="small">
              </app-avatar>
              <div class="member-text">
                <span class="member-name">{{ user.name }}</span>
                <span class="member-email">{{ user.email }}</span>
              </div>
              <span class="member-check">{{ isMemberSelected(user.id) ? 'Added' : 'Add' }}</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>Background Color</label>
          <div class="background-colors">
            <div
              *ngFor="let color of colorOptions"
              class="color-option"
              [style.background]="color"
              [class.selected]="newBoard.backgroundColor === color"
              (click)="newBoard.backgroundColor = color">
            </div>
          </div>
        </div>
      </form>
    </div>

    <div modal-footer>
      <app-button variant="secondary" (click)="closeCreateModal()">
        Cancel
      </app-button>
      <app-button
        variant="primary"
        (click)="createBoard($event)">
        Create
      </app-button>
    </div>
  </app-modal>
</div>
