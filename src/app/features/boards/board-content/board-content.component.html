<div class="board-content-container">
  <div 
    class="lists-container"
    cdkDropListGroup>
    <div 
      *ngFor="let list of board?.lists"
      class="list-wrapper">
      <app-list-item 
        [list]="list"
        [boardId]="board!.id"
        (cardSelected)="openCard($event)">
      </app-list-item>
    </div>

    <div class="add-list-wrapper">
      <div *ngIf="!showAddList" class="add-list-trigger" (click)="showAddList = true">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Add a list</span>
      </div>

      <div *ngIf="showAddList" class="add-list-form">
        <app-input
          placeholder="Enter list title..."
          [(value)]="newListTitle"
          (keyup.enter)="createList()"
          (keyup.escape)="cancelAddList()">
        </app-input>
        <div class="add-list-actions">
          <app-button 
            variant="primary" 
            size="small"
            [disabled]="!newListTitle.trim()"
            (clicked)="createList()">
            Add List
          </app-button>
          <button class="cancel-btn" (click)="cancelAddList()">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 8.586L2.929 1.515 1.515 2.929 8.586 10l-7.071 7.071 1.414 1.414L10 11.414l7.071 7.071 1.414-1.414L11.414 10l7.071-7.071-1.414-1.414L10 8.586z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!--
  Card detail modal — rendered HERE at board-content level,
  completely outside any cdkDrag element so position:fixed works correctly.
-->
<app-card-detail
  *ngIf="selectedCard"
  [(isOpen)]="showCardDetail"
  [card]="selectedCard"
  [boardId]="board?.id || ''"
  [listId]="selectedCard.listId">
</app-card-detail>
