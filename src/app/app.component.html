<div class="app-container">
  <!-- Header: only visible when authenticated -->
  <header class="app-header" *ngIf="currentUser">
    <div class="header-left">
      <div class="app-logo" routerLink="/boards">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <path d="M4 4h7v7H4zm0 9h7v7H4zm9-9h7v7h-7zm0 9h7v7h-7z"/>
          </svg>
        </div>
        <span class="logo-text">TaskFlow</span>
      </div>

      <div class="header-divider"></div>

      <nav class="main-nav">
        <a routerLink="/boards" routerLinkActive="active">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 3h8v8H3zm0 10h8v8H3zM13 3h8v8h-8zm0 10h8v8h-8z"/>
          </svg>
          Boards
        </a>
      </nav>
    </div>

    <div class="header-right">
      <app-notification-center></app-notification-center>

      <!-- User Dropdown -->
      <div class="user-menu" (click)="showUserMenu = !showUserMenu" [class.open]="showUserMenu">
        <app-avatar
          [imageUrl]="currentUser.avatar || ''"
          [name]="currentUser.name"
          size="small">
        </app-avatar>
        <span class="user-name">{{ currentUser.name }}</span>
        <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="currentColor"
          [style.transform]="showUserMenu ? 'rotate(180deg)' : 'rotate(0)'">
          <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>

        <!-- Dropdown panel -->
        <div class="user-dropdown" *ngIf="showUserMenu" (click)="$event.stopPropagation()">
          <div class="dropdown-user-info">
            <app-avatar
              [imageUrl]="currentUser.avatar || ''"
              [name]="currentUser.name"
              size="medium">
            </app-avatar>
            <div>
              <div class="dropdown-name">{{ currentUser.name }}</div>
              <div class="dropdown-email">{{ currentUser.email }}</div>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item logout-item" (click)="logout()">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/>
            </svg>
            Sign out
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Backdrop to close user dropdown -->
<div class="backdrop" *ngIf="showUserMenu" (click)="showUserMenu = false"></div>
